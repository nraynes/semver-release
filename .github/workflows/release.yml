name: CI/CD Release

permissions:
  contents: write
  id-token: write

on:
  push:
    branches: [ "main" ]
    paths:
      - './**'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sudo chown 755 ./.release/semver && ./.release/semver
