name: CI/CD Test

on:
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with: 
            fetch-depth: 0

      - name: Install Dependencies
        run: cargo build

      - name: Run Static Analysis
        run: cargo check

      - name: Run Linter
        run: cargo clippy -- -D warnings

      - name: Run Tests
        run: cargo test
